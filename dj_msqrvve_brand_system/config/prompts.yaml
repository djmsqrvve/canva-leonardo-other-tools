# DJ MSQRVVE Brand System Configuration
# Aesthetic: Twilight Shadowpunk
# Style Notes: Blade Runner meets bioluminescent nature / Sleepywood mystique
# Colors: Deep twilight purples, electric teals, warm amber neon, organic mossy greens, dark noir blacks

models:
  phoenix: "6b645e3a-d64f-4341-a6d8-7aa363f858d3" # Replace with actual Leonardo Phoenix Model ID
  kino: "98ab0a43-05b6-43b9-ab28-31ea67885b5d"   # Replace with actual Leonardo Kino Model ID
  pixel_art: "e5a291b6-3990-495a-b1fa-7bcc18cefb85" # Replace with actual Pixel Art Model ID

prompts:
  # --- SOCIAL MEDIA ---
  social_banner_bg:
    description: "Background for Twitch/YouTube/Twitter banners."
    model: "phoenix"
    prompt: "Twilight shadowpunk cityscape, inverted googie organic forms, deep twilight purples and electric teals, bioluminescent tech glowing in the dark noir blacks, neon-deco style, cinematic lighting, 8k resolution, highly detailed, empty space in the center for text."
    negative_prompt: "text, watermark, ugly, low resolution, crowded, messy"
    alchemy: true
    width: 1920
    height: 1080

  profile_avatar:
    description: "Character portrait for social profiles."
    model: "phoenix"
    prompt: "Cyberpunk character portrait, masquerave-noir theme, wearing a sleek bioluminescent mask, warm amber neon highlights, sleepywood mystique, polished and confident, masterpiece, vivid colors, dark background."
    negative_prompt: "ugly, malformed, extra limbs, bad anatomy, text, watermark"
    alchemy: true
    width: 1024
    height: 1024

  # --- STREAM ALERTS ---
  raid_alert_art:
    description: "Dynamic art for a raid alert."
    model: "phoenix"
    prompt: "A glowing neon sign displaying bioluminescent tech, masquerave-noir style, deep twilight purples and warm amber neon, cyberpunk wright architecture background, celebration mood, high quality."
    alchemy: true
    width: 1024
    height: 512

  follower_icon:
    description: "Small icon for new followers."
    model: "phoenix"
    prompt: "A small glowing orb, organic mossy greens and electric teals, sleepywood mystique, subtle orbit glow, isolated on black background, 3d render, high quality."
    alchemy: true
    width: 512
    height: 512

  # --- MSQRVVE MADNESS (MARCH SUBATHON 2026) ---
  madness_launch_key_art:
    description: "Primary launch hero art for MSQRVVE MADNESS."
    model: "phoenix"
    prompt: "MSQRVVE MADNESS subathon launch key art, high energy neon-deco x masquerave-noir visual style, bioluminescent streaks, futuristic stage atmosphere, dramatic cinematic lighting, composition with clear center safe zone for title text, no typography embedded."
    negative_prompt: "text, watermark, blurry, low quality, deformed, busy unreadable composition"
    alchemy: true
    width: 1920
    height: 1080

  madness_countdown_story:
    description: "Vertical countdown story panel for social promos."
    model: "phoenix"
    prompt: "Vertical social story art for MSQRVVE MADNESS countdown, cyberpunk event poster energy, neon cyan magenta gold accents, glowing timer motif, dynamic upward motion lines, clean central safe area for countdown text, no typography embedded."
    negative_prompt: "text, watermark, cluttered composition, low detail"
    alchemy: true
    width: 1080
    height: 1920

  madness_schedule_card:
    description: "Social schedule card background."
    model: "phoenix"
    prompt: "High contrast schedule card background for a livestream subathon, twilight shadowpunk architecture, geometric frame zones for schedule blocks, subtle decorative glow, premium editorial style, no typography embedded."
    negative_prompt: "text, watermark, low resolution, muddy colors"
    alchemy: true
    width: 1080
    height: 1350

  madness_sub_goal_meter_bg:
    description: "OBS HUD background plate for sub goal and timer."
    model: "phoenix"
    prompt: "Transparent-friendly styled HUD plate concept for live stream overlay, neon-deco plus googie-atomic accents, progress bar lanes, timer zone, elegant high tech frame, dark noir backdrop with luminous accents, no typography."
    negative_prompt: "text, watermark, photoreal people, noisy details"
    alchemy: true
    width: 1920
    height: 1080

  madness_discord_banner:
    description: "Discord announcement banner for event launch."
    model: "phoenix"
    prompt: "Discord announcement banner visual for MSQRVVE MADNESS, party energy, cyberpunk stage lights, vivid teal magenta brass palette, celebratory but clean composition with right-side safe area for copy, no embedded text."
    negative_prompt: "text, watermark, washed out, low quality"
    alchemy: true
    width: 1920
    height: 1080

  madness_game_vote_panel:
    description: "Community vote panel visual."
    model: "phoenix"
    prompt: "Community vote panel artwork for livestream game selection, modular card zones for 4 game choices, bioluminescent borders, modern esports broadcast design language, high contrast readability layout, no typography."
    negative_prompt: "text, watermark, low detail, messy composition"
    alchemy: true
    width: 1600
    height: 900

  # --- GAME ASSETS (HELIX 2000 - 2D) ---
  helix2000_tileset_grass:
    description: "Isometric grass/stone tileset for 2D game."
    model: "pixel_art"
    prompt: "2D game isometric tileset, sleepywood mystique, bioluminescent organic mossy greens, dark noir stone paths, pixel art hybrid, highly detailed, seamless texture."
    width: 1024
    height: 1024

  # --- GAME ASSETS (HELIX MAIN - 3D) ---
  helix_main_texture_metal:
    description: "Seamless metal texture for 3D game."
    model: "kino"
    prompt: "Seamless texture, usonian-luxe architecture panel, glowing electric teal lines, deep twilight purple base metal, PBR material base, high resolution, photorealistic."
    width: 1024
    height: 1024

  bevy_skybox:
    description: "Equirectangular skybox for 3D engine."
    model: "phoenix"
    prompt: "360 degree equirectangular panorama skybox, deep twilight purples, massive inverted googie organic forms in the distance, neon-deco cityscape, glowing orbit rings in the sky, 8k resolution, highly detailed sky."
    width: 2048
    height: 1024

canva_templates:
  twitch_starting_soon: "TEMPLATE_ID_HERE"
  youtube_thumbnail: "TEMPLATE_ID_HERE"
  twitter_post: "TEMPLATE_ID_HERE"
  madness_launch_key_art: "TEMPLATE_ID_HERE"
  madness_countdown_story: "TEMPLATE_ID_HERE"
  madness_schedule_card: "TEMPLATE_ID_HERE"
  madness_sub_goal_meter_bg: "TEMPLATE_ID_HERE"
  madness_discord_banner: "TEMPLATE_ID_HERE"
  madness_game_vote_panel: "TEMPLATE_ID_HERE"
